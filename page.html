<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Cocktails</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}

#mojDivVJs img {
    margin: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Galéria drinkov 🍹</h1>

<div id="mojDivVJs"></div>

<script>

const mojDivVJs = document.getElementById("mojDivVJs")

fetch("https://boozeapi.com/api/v1/cocktails")
.then((odpoved_raw) => {
    return odpoved_raw.json()
})
.then((odpoved) => {

    console.log(odpoved.data)

    odpoved.data.forEach((drink) => {
        const drinkImg = document.createElement("img")
        drinkImg.src = drink.image
        drinkImg.width = 200

        mojDivVJs.appendChild(drinkImg)
    })

})

</script>

</body>
</html>
